name: Daily YouTube AI Podcast Download

on:
  schedule:
    # UTC 0:00 = 北京时间 8:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python & FFmpeg
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          pip install yt-dlp

      - name: Cache Downloaded IDs
        uses: actions/cache@v4
        with:
          path: downloaded_ids.json
          key: yt-dlp-cache-${{ github.run_number }}
          restore-keys: yt-dlp-cache-

      - name: Run Download Script
        env:
          YT_COOKIES: ${{ secrets.YT_COOKIES }}
        run: |
          if [ -n "$YT_COOKIES" ]; then
            echo "$YT_COOKIES" > cookies.txt
            python download_ai_podcast.py --cookies cookies.txt
          else
            echo "⚠️ 未配置 Cookies，尝试无登录下载..."
            python download_ai_podcast.py
          fi

      - name: Upload MP3 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-podcasts-${{ github.run_id }}
          path: ./downloads/*.mp3
          retention-days: 7
